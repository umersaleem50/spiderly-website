name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      checks: write
      id-token: write
      actions: read
    uses: filiptrivan/ci-workflows/.github/workflows/claude-gate.yml@v1
    with:
      same_repo_only: true
      review_spec: |
        Next.js 16 (App Router, RSC) + Fumadocs MDX marketing/docs site for Spiderly, deployed on Vercel. NOTE: `npm run lint` is broken in this repo — judge style by the build (it type-checks) + Prettier (single quotes, 100 char width); do NOT flag the missing lint run.

        BLOCK CLASS (hard-block — high bar, objectively checkable):
        - a docs page renamed/moved/deleted without a redirect added in next.config.mjs (breaks already-indexed URLs).
        - a committed secret/credential.

        OWNER-RESERVED: a new cross-cutting pattern, or a change to the centralized SEO/metadata generator (src/utils/functions/metadata.ts) that affects every page.

        CONVENTIONS (advisory): correct/working MDX content and internal links; React Server Component vs client boundary correctness; SEO/metadata regressions; remove dead code left by deletions; logic errors; security.

        SKIP: anything under .source/, .next/, or node_modules/.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
